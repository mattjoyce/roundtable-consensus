# Agent executable configurations for the RTC runner.
#
# Each entry defines how to invoke an external coding agent CLI.
# The runner builds a mono context (state + API docs + curl examples)
# and pipes it to the agent. The agent uses curl to submit its action
# back to the engine directly.
#
# input_mode:
#   stdin  — pipe mono context to executable's stdin (default)
#   arg    — pass mono context as a CLI argument via prompt_arg
#   file   — write mono context to a temp file, pass path via prompt_arg
#
# system_prompt_arg: CLI flag for passing the system prompt separately.
#   If empty, system prompt is prepended to the mono context.

default_agent: claude-sonnet

agents:
  claude-sonnet:
    executable: claude
    args:
      - "--print"
      - "--dangerously-skip-permissions"
      - "--model"
      - "sonnet"
    input_mode: stdin
    system_prompt_arg: "--system-prompt"
    env: {}
    skip_home_isolation: true

  claude-opus:
    executable: claude
    args:
      - "--print"
      - "--dangerously-skip-permissions"
      - "--model"
      - "opus"
    input_mode: stdin
    system_prompt_arg: "--system-prompt"
    env: {}

  claude-haiku:
    executable: claude
    args:
      - "--print"
      - "--dangerously-skip-permissions"
      - "--model"
      - "haiku"
    input_mode: stdin
    system_prompt_arg: "--system-prompt"
    env: {}

  ollama-gemma4:
    # Uses the `pi` CLI as the harness. pi receives the mono context on
    # stdin and executes curl actions itself via its built-in bash tool —
    # no Python wrapper required. --no-session/--no-skills/-ne keep the
    # harness deterministic; --offline skips startup network probes.
    executable: pi
    args:
      - "-p"
      - "--no-session"
      - "--no-skills"
      - "-ne"
      - "--offline"
      - "--tools"
      - "bash"
      - "--model"
      - "ollama/gemma4"
    input_mode: stdin
    system_prompt_arg: "--system-prompt"
    env:
      # Runner isolates HOME, so point pi at its real config dir — that's
      # where the ollama provider + model registration lives. --no-session
      # still prevents any session writes there.
      PI_CODING_AGENT_DIR: "/Users/mattjoyce/.pi/agent"
      OLLAMA_HOST: "http://192.168.20.8:11434"

  ollama-qwen3:
    # Same pi harness, different model. Qwen3 has materially more
    # reliable tool-calling than gemma4 under current Ollama.
    executable: pi
    args:
      - "-p"
      - "--no-session"
      - "--no-skills"
      - "-ne"
      - "--offline"
      - "--tools"
      - "bash"
      - "--model"
      - "ollama/qwen3:14b"
    input_mode: stdin
    system_prompt_arg: "--system-prompt"
    env:
      PI_CODING_AGENT_DIR: "/Users/mattjoyce/.pi/agent"
      OLLAMA_HOST: "http://192.168.20.8:11434"
